<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders — Staff Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #111;
    color: #f0f0f0;
    min-height: 100vh;
  }

  header {
    background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  header h1 { font-size: 18px; font-weight: 700; }

  .live-dot {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #888;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #4ade80;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.3; }
  }

  .toolbar {
    padding: 12px 24px;
    display: flex;
    gap: 8px;
    border-bottom: 1px solid #1e1e1e;
  }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid #333;
    background: transparent;
    color: #888;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn.active {
    background: #c8a96e;
    border-color: #c8a96e;
    color: #111;
    font-weight: 700;
  }

  .empty {
    text-align: center;
    padding: 80px 24px;
    color: #444;
  }
  .empty .icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  .orders-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    padding: 20px 24px;
  }

  .order-card {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.2s;
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .order-card.new-order { border-color: #c8a96e; }
  .order-card.done { opacity: 0.4; }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px 10px;
    border-bottom: 1px solid #222;
  }

  .table-num {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .status-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .badge-new      { background: #c8a96e22; color: #c8a96e; border: 1px solid #c8a96e44; }
  .badge-making   { background: #60a5fa22; color: #60a5fa; border: 1px solid #60a5fa44; }
  .badge-done     { background: #4ade8022; color: #4ade80; border: 1px solid #4ade8044; }

  .card-items { padding: 12px 16px; }

  .order-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    padding: 4px 0;
    border-bottom: 1px solid #1e1e1e;
  }
  .order-row:last-child { border-bottom: none; }

  .order-qty { color: #c8a96e; font-weight: 700; margin-right: 8px; }
  .order-price { color: #555; font-size: 12px; }

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px 14px;
    border-top: 1px solid #222;
  }

  .order-time { font-size: 11px; color: #555; }
  .order-total { font-size: 14px; font-weight: 700; color: #c8a96e; }

  .card-actions {
    display: flex;
    gap: 8px;
    padding: 0 16px 14px;
  }

  .action-btn {
    flex: 1;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #333;
    background: transparent;
    color: #aaa;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .action-btn:hover { background: #222; }
  .action-btn.primary {
    background: #c8a96e;
    border-color: #c8a96e;
    color: #111;
  }
  .action-btn.primary:hover { background: #d4b87a; }

  .sound-toggle {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid #333;
    background: transparent;
    color: #888;
    font-size: 13px;
    cursor: pointer;
    margin-left: auto;
  }
  .sound-toggle.on { border-color: #4ade80; color: #4ade80; }
</style>
</head>
<body>

<header>
  <h1>☕ Orders</h1>
  <div class="live-dot">
    <div class="dot"></div>
    <span id="live-label">Connecting…</span>
  </div>
</header>

<div class="toolbar">
  <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn" onclick="setFilter('new', this)">New</button>
  <button class="filter-btn" onclick="setFilter('making', this)">Making</button>
  <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
  <button class="sound-toggle on" id="sound-btn" onclick="toggleSound(this)">🔔 Sound on</button>
</div>

<div id="orders-container">
  <div class="empty">
    <div class="icon">🕐</div>
    <p>Waiting for orders…</p>
  </div>
</div>

<!-- ✅ PASTE YOUR FIREBASE CONFIG HERE (same as menu.html) -->
<script type="module">
  import { initializeApp }                         from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onChildAdded, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDihjTaRSZedRbHDfBsoIgWenxRUX6nRmQ",
    authDomain: "trial-a390d.firebaseapp.com",
    databaseURL: "https://trial-a390d-default-rtdb.firebaseio.com",
    projectId: "trial-a390d",
    storageBucket: "trial-a390d.firebasestorage.app",
    messagingSenderId: "71883261564",
    appId: "1:71883261564:web:069b066139daa011fd6bf9"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  let soundOn  = true;
  let filter   = 'all';
  const orders = {};   // key → order data + card element

  // ── Audio alert (beep using Web Audio API) ──────────────────────────────
  function playBeep() {
    if (!soundOn) return;
    try {
      const ctx  = new (window.AudioContext || window.webkitAudioContext)();
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.start();
      osc.stop(ctx.currentTime + 0.4);
    } catch(e) {}
  }

  // ── Format time ─────────────────────────────────────────────────────────
  function fmtTime(ts) {
    const d = new Date(ts);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  // ── Render all cards ────────────────────────────────────────────────────
  function render() {
    const container = document.getElementById('orders-container');
    const keys = Object.keys(orders).reverse();
    const visible = keys.filter(k =>
      filter === 'all' || orders[k].status === filter
    );

    if (!keys.length) {
      container.innerHTML = `<div class="empty"><div class="icon">🕐</div><p>Waiting for orders…</p></div>`;
      return;
    }
    if (!visible.length) {
      container.innerHTML = `<div class="empty"><div class="icon">☑️</div><p>No ${filter} orders right now.</p></div>`;
      return;
    }

    container.innerHTML = `<div class="orders-grid">${visible.map(k => cardHTML(k, orders[k])).join('')}</div>`;
  }

  function cardHTML(key, o) {
    const badgeClass  = { new: 'badge-new', making: 'badge-making', done: 'badge-done' }[o.status] || 'badge-new';
    const badgeLabel  = { new: 'New', making: 'Making', done: 'Done' }[o.status] || 'New';
    const isNew       = o.status === 'new';
    const isDone      = o.status === 'done';

    const itemRows = o.items.map(i =>
      `<div class="order-row">
        <div><span class="order-qty">${i.qty}×</span>${i.name}</div>
        <div class="order-price">€${(i.price * i.qty).toFixed(2)}</div>
      </div>`
    ).join('');

    const actions = isDone
      ? `<div class="card-actions"><button class="action-btn" onclick="setStatus('${key}','new')">Reopen</button></div>`
      : isNew
      ? `<div class="card-actions">
           <button class="action-btn" onclick="setStatus('${key}','making')">Start making</button>
           <button class="action-btn primary" onclick="setStatus('${key}','done')">Done ✓</button>
         </div>`
      : `<div class="card-actions">
           <button class="action-btn primary" onclick="setStatus('${key}','done')">Mark done ✓</button>
         </div>`;

    return `
      <div class="order-card ${isNew ? 'new-order' : ''} ${isDone ? 'done' : ''}">
        <div class="card-header">
          <div class="table-num">Table ${o.table}</div>
          <span class="status-badge ${badgeClass}">${badgeLabel}</span>
        </div>
        <div class="card-items">${itemRows}</div>
        <div class="card-footer">
          <div class="order-time">${fmtTime(o.time)}</div>
          <div class="order-total">€${parseFloat(o.total).toFixed(2)}</div>
        </div>
        ${actions}
      </div>`;
  }

  // ── Status update ────────────────────────────────────────────────────────
  window.setStatus = async function(key, status) {
    orders[key].status = status;
    render();
    await update(ref(db, `orders/${key}`), { status });
  };

  // ── Filter ────────────────────────────────────────────────────────────────
  window.setFilter = function(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  };

  // ── Sound toggle ──────────────────────────────────────────────────────────
  window.toggleSound = function(btn) {
    soundOn = !soundOn;
    btn.classList.toggle('on', soundOn);
    btn.textContent = soundOn ? '🔔 Sound on' : '🔕 Sound off';
  };

  // ── Listen for new orders ─────────────────────────────────────────────────
  document.getElementById('live-label').textContent = 'Live';

  onChildAdded(ref(db, 'orders'), (snapshot) => {
    const key  = snapshot.key;
    const data = snapshot.val();
    const isFirst = !Object.keys(orders).length;

    orders[key] = data;
    render();

    // Only beep for genuinely new orders (not page-load history)
    if (!isFirst || data.status === 'new') {
      const age = Date.now() - data.time;
      if (age < 10000) playBeep(); // only beep if order < 10 seconds old
    }
  });
</script>
</body>
</html>
